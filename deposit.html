<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deposit Funds | Hudson Crypto</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <style>
        :root { --bg: #0d1117; --card: #161b22; --accent: #f0b90b; --border: #30363d; --text-dim: #8b949e; }
        body { background-color: var(--bg); color: #ffffff; font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; box-sizing: border-box; }
        
        .deposit-card { background: var(--card); border: 1px solid var(--border); border-radius: 20px; padding: 30px; width: 100%; max-width: 450px; text-align: center; box-shadow: 0 15px 50px rgba(0,0,0,0.5); }
        .back-link { display: block; text-align: left; color: var(--accent); text-decoration: none; font-size: 0.9rem; margin-bottom: 20px; }
        
        .qr-placeholder { background: white; padding: 15px; border-radius: 15px; display: inline-block; margin: 20px 0; }
        .qr-placeholder img { width: 180px; height: 180px; }

        .address-box { background: #0d1117; border: 1px solid var(--border); padding: 15px; border-radius: 10px; margin-top: 10px; display: flex; align-items: center; justify-content: space-between; font-family: monospace; font-size: 0.85rem; word-break: break-all; }
        .copy-btn { color: var(--accent); cursor: pointer; padding: 5px; margin-left: 10px; }

        .notice { background: rgba(240, 185, 11, 0.1); border-left: 4px solid var(--accent); padding: 15px; margin-top: 25px; text-align: left; font-size: 0.85rem; color: #e1e1e1; }
    </style>
</head>
<body>

    <div class="deposit-card">
        <a href="dashboard.html" class="back-link"><i class="fas fa-arrow-left"></i> Back to Dashboard</a>
        <h2 style="margin-bottom: 5px;">Deposit Bitcoin</h2>
        <p style="color: var(--text-dim); font-size: 0.9rem;">Send BTC to the address below to fund your account.</p>

        <div class="qr-placeholder">
            <img src="https://api.qrserver.com/v1/create-qr-code/?size=180x180&data=bc1qxy2kgdygjrsqtzq2n0yrf2493p83kkfjhx0wlh" alt="BTC QR Code">
        </div>

        <p style="text-align:left; font-size: 0.8rem; color: var(--text-dim); margin-bottom: 5px;">Your BTC Address:</p>
        <div class="address-box">
            <span id="btc-address">bc1qxy2kgdygjrsqtzq2n0yrf2493p83kkfjhx0wlh</span>
            <i class="fas fa-copy copy-btn" onclick="copyAddress()"></i>
        </div>

        <div class="notice">
            <i class="fas fa-info-circle" style="color: var(--accent);"></i>
            Deposits are credited after <strong>3 network confirmations</strong>. Please ensure you are sending <strong>Bitcoin (BTC)</strong> over the native network.
        </div>
    </div>

    <script>
        function copyAddress() {
            const address = document.getElementById('btc-address').innerText;
            navigator.clipboard.writeText(address);
            alert("Address copied to clipboard!");
        }
    </script>
</body>
</html>
