<!DOCTYPE html>
<html>
<head>

<title>Hudson Crypto Insights</title>

<style>

body{
font-family:Arial;
background:#0d1421;
color:white;
margin:0;
}

header{
background:#111827;
padding:20px;
text-align:center;
}

nav{
background:#1f2937;
padding:12px;
text-align:center;
}

nav a{
color:white;
margin:15px;
text-decoration:none;
font-weight:bold;
}

.container{
max-width:1000px;
margin:auto;
padding:30px;
}

table{
width:100%;
border-collapse:collapse;
}

th{
background:#1f2937;
padding:12px;
text-align:left;
}

td{
padding:12px;
border-bottom:1px solid #333;
}

.green{color:#16c784;}
.red{color:#ea3943;}

</style>

</head>

<body>

<header>

<h1>Hudson Crypto Insights</h1>
<p>Live Cryptocurrency Market Prices</p>

</header>

<nav>

<a href="#">Home</a>
<a href="#">Markets</a>
<a href="#">News</a>
<a href="#">About</a>

</nav>

<div class="container">

<h2>Top Crypto Prices</h2>

<table id="cryptoTable">

<tr>

<th>Coin</th>
<th>Price</th>
<th>24h Change</th>

</tr>

</table>

</div>

<script>

fetch("https://api.coingecko.com/api/v3/coins/markets?vs_currency=usd&order=market_cap_desc&per_page=10&page=1&sparkline=false")
.then(response => response.json())
.then(data => {

let table = document.getElementById("cryptoTable");

data.forEach(coin => {

let row = table.insertRow();

let name = row.insertCell(0);
let price = row.insertCell(1);
let change = row.insertCell(2);

name.innerHTML = coin.name;

price.innerHTML = "$" + coin.current_price;

change.innerHTML = coin.price_change_percentage_24h.toFixed(2) + "%";

if(coin.price_change_percentage_24h > 0){
change.className = "green";
}else{
change.className = "red";
}

});

});

</script>

</body>

</html>
