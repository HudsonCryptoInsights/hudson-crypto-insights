<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hudson Crypto Insights | Secure Bitcoin Investing</title>
    <style>
        body { background-color: #0d1117; color: #ffffff; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; display: flex; align-items: center; justify-content: center; min-height: 100vh; text-align: center; }
        .container { max-width: 600px; padding: 40px 20px; border: 1px solid #30363d; border-radius: 16px; background: #161b22; box-shadow: 0 10px 40px rgba(0,0,0,0.6); margin: 20px; }
        h1 { color: #f0b90b; font-size: 2rem; margin-bottom: 10px; }
        p { line-height: 1.6; color: #8b949e; margin-bottom: 30px; font-size: 1.1rem; }
        
        /* Widget Styling */
        .price-widget { margin: 20px auto; border-radius: 10px; overflow: hidden; max-width: 300px; }
        
        .btn { display: inline-block; margin-top: 30px; padding: 14px 28px; background-color: #f0b90b; color: #000; text-decoration: none; font-weight: bold; border-radius: 8px; transition: 0.3s; }
        .btn:hover { background-color: #d4a30a; transform: translateY(-2px); }
    </style>
</head>
<body>
    <div class="container">
        <h1>Hudson Crypto Insights</h1>
        <p>Providing a sophisticated gateway for investors to manage Bitcoin with institutional-grade security.</p>

        <div class="price-widget">
            <script src="https://widgets.coingecko.com/gecko-coin-price-chart-widget.js"></script>
            <gecko-coin-price-chart-widget  coin-id="bitcoin" currency="usd" height="300" locale="en" theme="dark"></gecko-coin-price-chart-widget>
        </div>

        <a href="#" class="btn">Start Your Investment</a>
    </div>
</body>
</html>
