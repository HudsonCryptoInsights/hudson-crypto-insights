<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hudson Crypto Insights | Secure Bitcoin Investing</title>
    <style>
        body { background-color: #0d1117; color: #ffffff; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .container { max-width: 600px; width: 100%; padding: 40px 20px; border: 1px solid #30363d; border-radius: 16px; background: #161b22; box-shadow: 0 10px 40px rgba(0,0,0,0.6); margin-bottom: 40px; text-align: center; }
        h1 { color: #f0b90b; margin-bottom: 10px; }
        p { color: #8b949e; margin-bottom: 30px; }
        
        /* Form Styling */
        .contact-form { text-align: left; margin-top: 30px; border-top: 1px solid #30363d; padding-top: 30px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; color: #f0b90b; font-size: 0.8rem; text-transform: uppercase; font-weight: bold; }
        input, textarea { width: 100%; padding: 12px; background: #0d1117; border: 1px solid #30363d; border-radius: 8px; color: white; box-sizing: border-box; font-size: 1rem; }
        input:focus, textarea:focus { border-color: #f0b90b; outline: none; }
        
        .btn { width: 100%; padding: 16px; background-color: #f0b90b; color: #000; border: none; font-weight: bold; border-radius: 8px; cursor: pointer; font-size: 1.1rem; transition: 0.3s; margin-top: 10px; }
        .btn:hover { background-color: #d4a30a; transform: scale(1.02); }

        .price-widget { margin: 20px auto; border-radius: 10px; overflow: hidden; }
    </style>
</head>
<body>

    <div class="container">
        <h1>Hudson Crypto Insights</h1>
        <p>Sophisticated Bitcoin management with institutional-grade security.</p>

        <div class="price-widget">
            <script src="https://widgets.coingecko.com/gecko-coin-price-chart-widget.js"></script>
            <gecko-coin-price-chart-widget coin-id="bitcoin" currency="usd" height="300" locale="en" theme="dark"></gecko-coin-price-chart-widget>
        </div>

        <div class="contact-form">
            <h2 style="text-align: center; margin-bottom: 20px;">Open an Account</h2>
            <form action="https://api.web3forms.com/submit" method="POST">
                
                <input type="hidden" name="access_key" value="d4dcf6f5-421a-46e7-ab59-bb701ea28caf">
                
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" name="name" required placeholder="Enter your name">
                </div>
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" name="email" required placeholder="your@email.com">
                </div>
                <div class="form-group">
                    <label>Investment Portfolio Size</label>
                    <input type="text" name="portfolio" placeholder="e.g. $10k - $50k">
                </div>
                
                <button type="submit" class="btn">Send Request</button>
            </form>
        </div>
    </div>

</body>
</html>
