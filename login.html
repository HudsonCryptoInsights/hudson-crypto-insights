<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Access | Hudson Crypto Insights</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <style>
        body { background-color: #0d1117; color: #ffffff; font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; overflow: hidden; }
        
        /* BACKGROUND DECORATION */
        .bg-glow { position: absolute; width: 300px; height: 300px; background: rgba(240, 185, 11, 0.1); filter: blur(100px); border-radius: 50%; z-index: -1; top: 20%; left: 10%; }

        .auth-container { width: 100%; max-width: 400px; padding: 40px; background: #161b22; border: 1px solid #30363d; border-radius: 20px; box-shadow: 0 20px 60px rgba(0,0,0,0.6); text-align: center; position: relative; }
        
        .logo-area { font-size: 2.5rem; color: #f0b90b; margin-bottom: 10px; }
        h2 { margin-bottom: 8px; font-size: 1.5rem; }
        .auth-subtitle { color: #8b949e; font-size: 0.9rem; margin-bottom: 30px; }

        /* FORM STYLING */
        .form-group { margin-bottom: 20px; text-align: left; }
        label { display: block; font-size: 0.8rem; color: #8b949e; margin-bottom: 8px; margin-left: 5px; text-transform: uppercase; letter-spacing: 1px; }
        .input-wrapper { position: relative; }
        .input-wrapper i { position: absolute; left: 15px; top: 50%; transform: translateY(-50%); color: #484f58; }
        input { width: 100%; padding: 14px 14px 14px 45px; background: #0d1117; border: 1px solid #30363d; border-radius: 10px; color: white; font-size: 1rem; box-sizing: border-box; transition: 0.3s; }
        input:focus { border-color: #f0b90b; outline: none; box-shadow: 0 0 0 2px rgba(240, 185, 11, 0.2); }

        .btn-auth { width: 100%; padding: 15px; background: #f0b90b; color: #000; border: none; border-radius: 10px; font-weight: 800; font-size: 1rem; cursor: pointer; transition: 0.3s; margin-top: 10px; }
        .btn-auth:hover { background: #ffca2c; transform: translateY(-2px); }

        .switch-mode { margin-top: 25px; font-size: 0.9rem; color: #8b949e; }
        .switch-mode span { color: #f0b90b; cursor: pointer; font-weight: bold; text-decoration: underline; }

        /* LOADING OVERLAY */
        #loader { display: none; margin-top: 15px; color: #f0b90b; font-size: 0.9rem; font-weight: bold; }
    </style>
</head>
<body>

    <div class="bg-glow"></div>

    <div class="auth-container">
        <div class="logo-area"><i class="fa-solid fa-building-shield"></i></div>
        <h2 id="auth-title">Welcome Back</h2>
        <p class="auth-subtitle" id="auth-desc">Please enter your institutional credentials.</p>

        <form id="mainAuthForm">
            <div class="form-group" id="name-group" style="display: none;">
                <label>Full Name</label>
                <div class="input-wrapper">
                    <i class="fas fa-user"></i>
                    <input type="text" id="fullname" placeholder="John Doe">
                </div>
            </div>

            <div class="form-group">
                <label>Email Address</label>
                <div class="input-wrapper">
                    <i class="fas fa-envelope"></i>
                    <input type="email" id="email" placeholder="name@company.com" required>
                </div>
            </div>

            <div class="form-group">
                <label>Secure Password</label>
                <div class="input-wrapper">
                    <i class="fas fa-lock"></i>
                    <input type="password" id="password" placeholder="••••••••" required>
                </div>
            </div>

            <button type="submit" class="btn-auth" id="submit-btn">Authorize Access</button>
            <div id="loader"><i class="fas fa-circle-notch fa-spin"></i> Verifying with Blockchain Node...</div>
        </form>

        <div class="switch-mode">
            <p id="toggle-msg">Don't have an account? <span onclick="toggleMode()">Create One</span></p>
        </div>
    </div>

    <script>
        let isLoginMode = true;

        function toggleMode() {
            isLoginMode = !isLoginMode;
            const title = document.getElementById('auth-title');
            const desc = document.getElementById('auth-desc');
            const btn = document.getElementById('submit-btn');
            const toggleMsg = document.getElementById('toggle-msg');
            const nameGroup = document.getElementById('name-group');

            if (isLoginMode) {
                title.innerText = "Welcome Back";
                desc.innerText = "Please enter your institutional credentials.";
                btn.innerText = "Authorize Access";
                toggleMsg.innerHTML = 'Don\'t have an account? <span onclick="toggleMode()">Create One</span>';
                nameGroup.style.display = 'none';
            } else {
                title.innerText = "Create Account";
                desc.innerText = "Start your institutional-grade crypto journey.";
                btn.innerText = "Register Portfolio";
                toggleMsg.innerHTML = 'Already registered? <span onclick="toggleMode()">Login here</span>';
                nameGroup.style.display = 'block';
            }
        }

        document.getElementById('mainAuthForm').addEventListener('submit', function(e) {
            e.preventDefault();
            document.getElementById('submit-btn').style.display = 'none';
            document.getElementById('loader').style.display = 'block';

            // Simulate a secure redirect to your dashboard
            setTimeout(() => {
                window.location.href = "index.html"; 
            }, 2000);
        });
    </script>
</body>
</html>
